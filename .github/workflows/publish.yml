name: Publish Package

# Releases are triggered by pushing a version tag (e.g. v1.2.3).
# The `release` environment adds a manual approval gate before publish runs.
on:
  push:
    tags:
      - "v*"

# Least privilege at the top; the publish job opts into id-token below.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest # OIDC requires GitHub-hosted runners (no self-hosted)
    environment: release # manual approval gate (configured in GitHub settings)
    permissions:
      contents: read
      id-token: write # REQUIRED for OIDC trusted publishing
    steps:
      # Actions are pinned to full commit SHAs so a compromised/retagged tag
      # cannot run in the publish job. Trailing comment records the version.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22" # must resolve to >= 22.14.0
          registry-url: "https://registry.npmjs.org"

      # GitHub runners ship npm < 11.5.1; OIDC needs >= 11.5.1. Upgrade first.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present

      # No NODE_AUTH_TOKEN, no --provenance flag needed: OIDC authenticates the
      # publish and provenance is attached automatically (public package + repo).
      - run: npm publish
